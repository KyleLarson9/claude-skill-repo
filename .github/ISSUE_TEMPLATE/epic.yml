name: Epic
description: A large body of work tracked across multiple child issues.
title: "Epic: "
labels: ["epic"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - skill
        - plugin
        - ci-cd
        - documentation
        - other
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal / objective
      description: What is the overall objective of this epic?
    validations:
      required: true
  - type: textarea
    id: children
    attributes:
      label: Planned child issues
      description: Checklist of the child issues this epic tracks.
    validations:
      required: false
